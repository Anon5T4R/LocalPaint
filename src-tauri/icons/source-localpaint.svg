<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo (âmbar do LocalPaint; estilo da suíte) -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- a tela em branco (painel) -->
  <rect x="200" y="220" width="624" height="500" rx="40" fill="#ffffff" opacity="0.96"/>

  <!-- pincelada: o gesto raster é o pilar do app -->
  <path d="M270 600 Q360 420 480 520 T760 380"
        fill="none" stroke="#d97706" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- respingos de tinta -->
  <circle cx="330" cy="380" r="34" fill="#0ea5e9"/>
  <circle cx="700" cy="600" r="26" fill="#dc2626"/>
  <circle cx="600" cy="300" r="20" fill="#5aa02c"/>

  <!-- cabo do pincel entrando pela borda -->
  <path d="M756 388 L900 244" stroke="#7c3f10" stroke-width="64" stroke-linecap="round"/>
  <path d="M756 388 L812 332" stroke="#e5e7eb" stroke-width="64" stroke-linecap="round"/>

  <!-- assinatura da marca -->
  <text x="512" y="908" font-family="Segoe Script, cursive" font-size="80"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
