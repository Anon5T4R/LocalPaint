<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo âmbar do LocalPaint (estilo da suíte) -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- PALETA de pintor (a silhueta que diferencia do painel do Record):
       forma de rim com furo do polegar, levemente rotacionada -->
  <g transform="rotate(-12 512 520)">
    <path d="M512 240
             C 700 240 830 350 830 500
             C 830 585 770 640 690 640
             C 645 640 620 615 580 615
             C 545 615 525 640 525 675
             C 525 730 570 755 570 790
             C 570 830 535 850 495 850
             C 320 850 194 720 194 545
             C 194 375 330 240 512 240 Z"
          fill="#fdf6ec"/>
    <!-- furo do polegar -->
    <ellipse cx="600" cy="500" rx="58" ry="48" fill="#c07a10"/>

    <!-- bolhas de tinta -->
    <circle cx="360" cy="380" r="46" fill="#dc2626"/>
    <circle cx="490" cy="330" r="46" fill="#0ea5e9"/>
    <circle cx="330" cy="520" r="46" fill="#5aa02c"/>
    <circle cx="360" cy="660" r="46" fill="#7c3aed"/>
    <circle cx="480" cy="740" r="42" fill="#ec4899"/>
  </g>

  <!-- pincel atravessando por cima -->
  <g transform="rotate(38 700 420)">
    <rect x="676" y="150" width="52" height="330" rx="20" fill="#7c3f10"/>
    <rect x="676" y="470" width="52" height="56" fill="#e5e7eb"/>
    <path d="M676 526 h52 l-6 96 c-2 26 -38 26 -40 0 z" fill="#3b2a1a"/>
  </g>

  <!-- assinatura da marca -->
  <text x="512" y="928" font-family="Segoe Script, cursive" font-size="80"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
